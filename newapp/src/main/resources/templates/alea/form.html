<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Création de Devis Fournisseur - NewApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <style>
        .item-row {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .select2-container {
            width: 100% !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">NewApp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/suppliers">Fournisseurs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/accounting/invoices">Comptabilité</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/alea/form">Nouveau Devis</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-link nav-link">Déconnexion</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

        <div class="card">
            <div class="card-header bg-primary text-white">
                <h3 class="card-title mb-0">Création de Devis Fournisseur</h3>
            </div>
            <div class="card-body">
                <form id="quotationForm" th:action="@{/alea/submit-quotation}" method="post">
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="supplier" class="form-label">Fournisseur</label>
                                <select class="form-select select2" id="supplier" name="supplier" required>
                                    <option value="">Sélectionner un fournisseur</option>
                                    <option th:each="supplier : ${suppliers}" th:value="${supplier.name}" th:text="${supplier.supplierName}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="supplierDate" class="form-label">Date du Devis</label>
                                <input type="text" class="form-control datepicker" id="supplierDate" name="supplierDate" required>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="requiredByDate" class="form-label">Date Requise</label>
                                <input type="text" class="form-control datepicker" id="requiredByDate" name="requiredByDate" required>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4>Articles</h4>
                        <button type="button" id="addItemBtn" class="btn btn-success">
                            <i class="bi bi-plus-circle"></i> Ajouter un Article
                        </button>
                    </div>

                    <div id="itemsContainer">
                        <div class="item-row row">
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label class="form-label">Nom de l'Article</label>
                                    <select class="form-select item-select" name="itemName" required>
                                        <option value="">Sélectionner un article</option>
                                        <option th:each="item : ${items}" th:value="${item.name}" th:text="${item.name}"></option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="mb-3">
                                    <label class="form-label">Quantité</label>
                                    <input type="number" class="form-control" name="quantity" min="1" step="1" value="1" required>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label class="form-label">Entrepôt</label>
                                    <select class="form-select warehouse-select" name="warehouse" required>
                                        <option value="">Sélectionner un entrepôt</option>
                                        <option th:each="warehouse : ${warehouses}" th:value="${warehouse.name}" th:text="${warehouse.name}"></option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-1">
                                <div class="mb-3">
                                    <label class="form-label d-block">&nbsp;</label>
                                    <button type="button" class="btn btn-danger remove-item">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Soumettre le Devis</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Template pour nouvel élément -->
    <template id="item-template">
        <div class="item-row row">
            <div class="col-md-4">
                <div class="mb-3">
                    <label class="form-label">Nom de l'Article</label>
                    <select class="form-select item-select" name="itemName" required>
                        <option value="">Sélectionner un article</option>
                        <option th:each="item : ${items}" th:value="${item.name}" th:text="${item.name}"></option>
                    </select>
                </div>
            </div>
            <div class="col-md-3">
                <div class="mb-3">
                    <label class="form-label">Quantité</label>
                    <input type="number" class="form-control" name="quantity" min="1" step="1" value="1" required>
                </div>
            </div>
            <div class="col-md-4">
                <div class="mb-3">
                    <label class="form-label">Entrepôt</label>
                    <select class="form-select warehouse-select" name="warehouse" required>
                        <option value="">Sélectionner un entrepôt</option>
                        <option th:each="warehouse : ${warehouses}" th:value="${warehouse.name}" th:text="${warehouse.name}"></option>
                    </select>
                </div>
            </div>
            <div class="col-md-1">
                <div class="mb-3">
                    <label class="form-label d-block">&nbsp;</label>
                    <button type="button" class="btn btn-danger remove-item">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script>
        $(document).ready(function() {
            // Initialiser les datepickers
            $(".datepicker").flatpickr({
                dateFormat: "Y-m-d",
                defaultDate: new Date()
            });

            // Initialiser Select2 pour le fournisseur
            $(".select2").select2();
            
            // Initialiser Select2 pour les premiers éléments
            initializeSelectsForRow($(".item-row:first"));

            // Ajouter un item
            $("#addItemBtn").click(function() {
                // Récupérer le contenu du template
                let itemRow;
                
                // Utiliser importNode pour IE11 ou les navigateurs plus anciens
                if ('content' in document.createElement('template')) {
                    const template = document.getElementById('item-template');
                    itemRow = template.content.cloneNode(true);
                } else {
                    // Fallback pour les navigateurs plus anciens
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = `
                        <div class="item-row row">
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label class="form-label">Nom de l'Article</label>
                                    <select class="form-select item-select" name="itemName" required>
                                        <option value="">Sélectionner un article</option>
                                        ${Array.from(document.querySelectorAll('.item-select:first option')).map(opt => 
                                          `<option value="${opt.value}">${opt.textContent}</option>`).join('')}
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="mb-3">
                                    <label class="form-label">Quantité</label>
                                    <input type="number" class="form-control" name="quantity" min="1" step="1" value="1" required>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label class="form-label">Entrepôt</label>
                                    <select class="form-select warehouse-select" name="warehouse" required>
                                        <option value="">Sélectionner un entrepôt</option>
                                        ${Array.from(document.querySelectorAll('.warehouse-select:first option')).map(opt => 
                                          `<option value="${opt.value}">${opt.textContent}</option>`).join('')}
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-1">
                                <div class="mb-3">
                                    <label class="form-label d-block">&nbsp;</label>
                                    <button type="button" class="btn btn-danger remove-item">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    itemRow = tempDiv.firstChild;
                }
                
                // Ajouter la nouvelle ligne au DOM
                $("#itemsContainer").append(itemRow);
                
                // Initialiser Select2 pour la nouvelle ligne
                initializeSelectsForRow($(".item-row:last"));
            });

            // Supprimer un item
            $(document).on('click', '.remove-item', function() {
                if ($(".item-row").length > 1) {
                    $(this).closest('.item-row').remove();
                } else {
                    alert("Vous devez avoir au moins un article dans le devis.");
                }
            });

            // Fonction pour initialiser Select2 sur une ligne spécifique
            function initializeSelectsForRow(row) {
                $(row).find('.item-select').select2({
                    placeholder: "Sélectionner un article"
                });
                
                $(row).find('.warehouse-select').select2({
                    placeholder: "Sélectionner un entrepôt"
                });
            }
        });
    </script>
</body>
</html>
