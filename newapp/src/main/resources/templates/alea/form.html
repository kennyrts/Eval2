<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nouveau Devis - NewApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <style>
        body {
            display: flex;
            min-height: 100vh;
            margin: 0;
        }
        .sidebar {
            width: 250px;
            background-color: #343a40;
            color: #fff;
            flex-shrink: 0;
            height: 100vh;
            position: sticky;
            top: 0;
        }
        .sidebar-header {
            padding: 1.5rem 1rem;
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sidebar-nav {
            padding: 1rem 0;
        }
        .sidebar-nav .nav-link {
            color: rgba(255, 255, 255, 0.7);
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-nav .nav-link.active {
            color: white;
            background-color: rgba(255, 255, 255, 0.1);
        }
        .sidebar-nav .nav-link:hover {
            color: white;
            background-color: rgba(255, 255, 255, 0.05);
        }
        .main-content {
            flex-grow: 1;
            padding: 2rem;
            background-color: #f8f9fa;
        }
        .card {
            border: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.5rem;
        }
        .logout-btn {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: auto;
            padding: 1rem;
        }
        .logout-btn button {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            padding: 0.5rem;
            width: 100%;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logout-btn button:hover {
            color: white;
        }
        .item-row {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .select2-container {
            width: 100% !important;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column">
        <div class="sidebar-header">
            <strong>NewApp</strong>
        </div>
        <ul class="nav flex-column sidebar-nav">
            <li class="nav-item">
                <a class="nav-link" href="/suppliers">
                    <i class="bi bi-building"></i> Fournisseurs
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/accounting/invoices">
                    <i class="bi bi-file-earmark-text"></i> Comptabilité
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="/alea/form">
                    <i class="bi bi-file-earmark-plus"></i> Nouveau Devis
                </a>
            </li>
        </ul>
        <div class="logout-btn mt-auto">
            <form th:action="@{/logout}" method="post">
                <button type="submit">
                    <i class="bi bi-box-arrow-right"></i> Déconnexion
                </button>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Nouveau Devis</h2>
        </div>

        <div class="card">
            <div class="card-body">
                <form id="quotationForm" th:action="@{/alea/submit-quotation}" method="post">
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="supplier" class="form-label">Fournisseur</label>
                                <select class="form-select select2" id="supplier" name="supplier" required>
                                    <option value="">Sélectionner un fournisseur</option>
                                    <option th:each="supplier : ${suppliers}" th:value="${supplier.name}" th:text="${supplier.supplierName}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="supplierDate" class="form-label">Date du Devis</label>
                                <input type="text" class="form-control datepicker" id="supplierDate" name="supplierDate" required>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="requiredByDate" class="form-label">Date Requise</label>
                                <input type="text" class="form-control datepicker" id="requiredByDate" name="requiredByDate" required>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4>Articles</h4>
                        <button type="button" id="addItemBtn" class="btn btn-success">
                            <i class="bi bi-plus-circle"></i> Ajouter un Article
                        </button>
                    </div>

                    <div id="itemsContainer">
                        <div class="item-row row">
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label class="form-label">Nom de l'Article</label>
                                    <select class="form-select item-select" name="itemName" required>
                                        <option value="">Sélectionner un article</option>
                                        <option th:each="item : ${items}" th:value="${item.name}" th:text="${item.name}"></option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="mb-3">
                                    <label class="form-label">Quantité</label>
                                    <input type="number" class="form-control" name="quantity" min="1" step="1" value="1" required>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label class="form-label">Entrepôt</label>
                                    <select class="form-select warehouse-select" name="warehouse" required>
                                        <option value="">Sélectionner un entrepôt</option>
                                        <option th:each="warehouse : ${warehouses}" th:value="${warehouse.name}" th:text="${warehouse.name}"></option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-1">
                                <div class="mb-3">
                                    <label class="form-label d-block">&nbsp;</label>
                                    <button type="button" class="btn btn-danger remove-item">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-send"></i> Créer le Devis
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Template pour nouvel élément -->
    <template id="item-template">
        <div class="item-row row">
            <div class="col-md-4">
                <div class="mb-3">
                    <label class="form-label">Nom de l'Article</label>
                    <select class="form-select item-select" name="itemName" required>
                        <option value="">Sélectionner un article</option>
                        <option th:each="item : ${items}" th:value="${item.name}" th:text="${item.name}"></option>
                    </select>
                </div>
            </div>
            <div class="col-md-3">
                <div class="mb-3">
                    <label class="form-label">Quantité</label>
                    <input type="number" class="form-control" name="quantity" min="1" step="1" value="1" required>
                </div>
            </div>
            <div class="col-md-4">
                <div class="mb-3">
                    <label class="form-label">Entrepôt</label>
                    <select class="form-select warehouse-select" name="warehouse" required>
                        <option value="">Sélectionner un entrepôt</option>
                        <option th:each="warehouse : ${warehouses}" th:value="${warehouse.name}" th:text="${warehouse.name}"></option>
                    </select>
                </div>
            </div>
            <div class="col-md-1">
                <div class="mb-3">
                    <label class="form-label d-block">&nbsp;</label>
                    <button type="button" class="btn btn-danger remove-item">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script>
        $(document).ready(function() {
            // Initialiser les datepickers
            $(".datepicker").flatpickr({
                dateFormat: "Y-m-d",
                defaultDate: new Date()
            });

            // Initialiser Select2 pour le fournisseur
            $(".select2").select2();
            
            // Initialiser Select2 pour les premiers éléments
            initializeSelectsForRow($(".item-row:first"));

            // Ajouter un item
            $("#addItemBtn").click(function() {
                // Récupérer le contenu du template
                let itemRow;
                
                // Utiliser importNode pour IE11 ou les navigateurs plus anciens
                if ('content' in document.createElement('template')) {
                    const template = document.getElementById('item-template');
                    itemRow = template.content.cloneNode(true);
                } else {
                    // Fallback pour les navigateurs plus anciens
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = `
                        <div class="item-row row">
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label class="form-label">Nom de l'Article</label>
                                    <select class="form-select item-select" name="itemName" required>
                                        <option value="">Sélectionner un article</option>
                                        ${Array.from(document.querySelectorAll('.item-select:first option')).map(opt => 
                                          `<option value="${opt.value}">${opt.textContent}</option>`).join('')}
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="mb-3">
                                    <label class="form-label">Quantité</label>
                                    <input type="number" class="form-control" name="quantity" min="1" step="1" value="1" required>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label class="form-label">Entrepôt</label>
                                    <select class="form-select warehouse-select" name="warehouse" required>
                                        <option value="">Sélectionner un entrepôt</option>
                                        ${Array.from(document.querySelectorAll('.warehouse-select:first option')).map(opt => 
                                          `<option value="${opt.value}">${opt.textContent}</option>`).join('')}
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-1">
                                <div class="mb-3">
                                    <label class="form-label d-block">&nbsp;</label>
                                    <button type="button" class="btn btn-danger remove-item">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    itemRow = tempDiv.firstChild;
                }
                
                // Ajouter la nouvelle ligne au DOM
                $("#itemsContainer").append(itemRow);
                
                // Initialiser Select2 pour la nouvelle ligne
                initializeSelectsForRow($(".item-row:last"));
            });

            // Supprimer un item
            $(document).on('click', '.remove-item', function() {
                if ($(".item-row").length > 1) {
                    $(this).closest('.item-row').remove();
                } else {
                    alert("Vous devez avoir au moins un article dans le devis.");
                }
            });

            // Fonction pour initialiser Select2 sur une ligne spécifique
            function initializeSelectsForRow(row) {
                $(row).find('.item-select').select2({
                    placeholder: "Sélectionner un article"
                });
                
                $(row).find('.warehouse-select').select2({
                    placeholder: "Sélectionner un entrepôt"
                });
            }
        });
    </script>
</body>
</html>
