<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Liste des Factures - NewApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .status-paid {
            background-color: #98D85B;
            color: #fff;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .status-partly-paid {
            background-color: #FFB01F;
            color: #fff;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .status-overdue {
            background-color: #FF5B5B;
            color: #fff;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .table > tbody > tr > td {
            vertical-align: middle;
        }
        .invoice-id {
            color: #2490EF;
            text-decoration: none;
        }
        .invoice-id:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">NewApp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/suppliers">Fournisseurs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/accounting/invoices">Comptabilité</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-link nav-link">Déconnexion</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Factures d'Achat</h2>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th style="width: 30px;"></th>
                                <th>Titre</th>
                                <th>Statut</th>
                                <th>Date</th>
                                <th>Société</th>
                                <th class="text-end">Montant Total</th>
                                <th>ID</th>
                                <th style="width: 100px;">Âge</th>
                                <th style="width: 100px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="invoice : ${invoices}">
                                <td>
                                    <input type="checkbox" class="form-check-input">
                                </td>
                                <td th:text="${invoice.supplierName}">FOURNISSEUR</td>
                                <td>
                                    <span th:class="${
                                        invoice.status == 'Paid' ? 'status-paid' : 
                                        (invoice.status == 'Partly Paid' ? 'status-partly-paid' : 
                                        (invoice.status == 'Overdue' ? 'status-overdue' : ''))}"
                                          th:text="${invoice.status}">STATUT</span>
                                </td>
                                <td th:text="${invoice.postingDate}">DATE</td>
                                <td th:text="${invoice.company}">SOCIÉTÉ</td>
                                <td class="text-end" th:text="${'€ ' + invoice.grandTotal}">TOTAL</td>
                                <td>
                                    <a th:href="@{/accounting/invoices/{id}(id=${invoice.name})}" 
                                       class="invoice-id" th:text="${invoice.name}">ID</a>
                                </td>
                                <td>23h</td>
                                <td>
                                    <div class="btn-group">
                                        <button type="button" class="btn btn-sm btn-light">
                                            <i class="bi bi-chat"></i>
                                        </button>
                                        <button type="button" class="btn btn-sm btn-light">
                                            <i class="bi bi-star"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${invoices.empty}">
                                <td colspan="9" class="text-center">Aucune facture trouvée</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
</body>
</html>
