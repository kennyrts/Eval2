<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Liste des Factures - NewApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">NewApp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/suppliers">Fournisseurs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/accounting/invoices">Comptabilité</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-link nav-link">Déconnexion</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Factures d'Achat</h2>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Fournisseur</th>
                                <th>Date</th>
                                <th>Statut</th>
                                <th class="text-end">Montant Total</th>
                                <th class="text-end">Montant Dû</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="invoice : ${invoices}">
                                <td th:text="${invoice.name}">ID</td>
                                <td th:text="${invoice.supplierName}">FOURNISSEUR</td>
                                <td th:text="${invoice.postingDate}">DATE</td>
                                <td>
                                    <span th:class="${
                                        invoice.status == 'Paid' ? 'badge bg-success' : 
                                        (invoice.status == 'Partly Paid' ? 'badge bg-warning' : 
                                        (invoice.status == 'Overdue' ? 'badge bg-danger' : 'badge bg-secondary'))}"
                                        th:text="${invoice.status}">STATUT</span>
                                </td>
                                <td class="text-end" th:text="${'€ ' + invoice.grandTotal}">TOTAL</td>
                                <td class="text-end" th:text="${'€ ' + invoice.outstandingAmount}">MONTANT DÛ</td>
                                <td>
                                    <button type="button" class="btn btn-sm btn-primary">
                                        Payer
                                    </button>
                                </td>
                            </tr>
                            <tr th:if="${invoices.empty}">
                                <td colspan="7" class="text-center">Aucune facture trouvée</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
</body>
</html>
