<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Liste des Factures - NewApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://getbootstrap.com/docs/5.1/assets/img/favicons/favicon-32x32.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <style>
        body {
            display: flex;
            min-height: 100vh;
            margin: 0;
        }
        .sidebar {
            width: 250px;
            background-color: #343a40;
            color: #fff;
            flex-shrink: 0;
            height: 100vh;
            position: sticky;
            top: 0;
        }
        .sidebar-header {
            padding: 1.5rem 1rem;
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sidebar-nav {
            padding: 1rem 0;
        }
        .sidebar-nav .nav-link {
            color: rgba(255, 255, 255, 0.7);
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-nav .nav-link.active {
            color: white;
            background-color: rgba(255, 255, 255, 0.1);
        }
        .sidebar-nav .nav-link:hover {
            color: white;
            background-color: rgba(255, 255, 255, 0.05);
        }
        .main-content {
            flex-grow: 1;
            padding: 2rem;
            background-color: #f8f9fa;
        }
        .card {
            border: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .logout-btn {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: auto;
            padding: 1rem;
        }
        .logout-btn button {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            padding: 0.5rem;
            width: 100%;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logout-btn button:hover {
            color: white;
        }
        .badge {
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        .badge-paid {
            background-color: #98D85B;
            color: white;
        }
        .badge-partly-paid {
            background-color: #FFB01F;
            color: white;
        }
        .badge-overdue {
            background-color: #FF5B5B;
            color: white;
        }
        .badge-draft {
            background-color: #6c757d;
            color: white;
        }
        .spinner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .spinner-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column">
        <div class="sidebar-header">
            <strong>NewApp</strong>
        </div>
        <ul class="nav flex-column sidebar-nav">
            <li class="nav-item">
                <a class="nav-link" href="/suppliers">
                    <i class="bi bi-building"></i> Fournisseurs
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="/accounting/invoices">
                    <i class="bi bi-file-earmark-text"></i> Comptabilité
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/alea/form">
                    <i class="bi bi-file-earmark-plus"></i> Nouveau Devis
                </a>
            </li>
        </ul>
        <div class="logout-btn mt-auto">
            <form th:action="@{/logout}" method="post">
                <button type="submit">
                    <i class="bi bi-box-arrow-right"></i> Déconnexion
                </button>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Alert pour les messages -->
        <div id="alertContainer">
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Factures d'Achat</h2>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Fournisseur</th>
                                <th>Date</th>
                                <th>Statut</th>
                                <th class="text-end">Montant Total</th>
                                <th class="text-end">Montant Dû</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="invoice : ${invoices}">
                                <td th:text="${invoice.name}">ID</td>
                                <td th:text="${invoice.supplierName}">FOURNISSEUR</td>
                                <td th:text="${invoice.postingDate}">DATE</td>
                                <td>
                                    <span th:class="${
                                        invoice.status == 'Paid' ? 'badge badge-paid' : 
                                        (invoice.status == 'Partly Paid' ? 'badge badge-partly-paid' : 
                                        (invoice.status == 'Overdue' ? 'badge badge-overdue' : 'badge badge-draft'))}"
                                        th:text="${invoice.status}">STATUT</span>
                                </td>
                                <td class="text-end" th:text="${'€ ' + invoice.grandTotal}">TOTAL</td>
                                <td class="text-end" th:text="${'€ ' + invoice.outstandingAmount}">MONTANT DÛ</td>
                                <td>
                                    <div class="action-buttons">
                                        <button type="button" class="btn btn-sm btn-primary"
                                                th:if="${invoice.status != 'Paid'}"
                                                onclick="openPaymentModal(this)"
                                                th:data-invoice-id="${invoice.name}"
                                                th:data-supplier="${invoice.supplierName}"
                                                th:data-amount="${invoice.outstandingAmount}">
                                            Payer
                                        </button>
                                        <a th:href="@{/accounting/invoices/{invoiceName}/pdf(invoiceName=${invoice.name})}" 
                                           class="btn btn-sm btn-primary" 
                                           target="_blank" 
                                           title="Imprimer">
                                            <i class="bi bi-printer"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${invoices.empty}">
                                <td colspan="7" class="text-center">Aucune facture trouvée</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de paiement -->
    <div class="modal fade" id="paymentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nouveau Paiement</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="paymentForm" onsubmit="submitPayment(event)">
                    <div class="modal-body">
                        <input type="hidden" id="invoiceId" name="invoiceId">
                        
                        <div class="mb-3">
                            <label for="supplier" class="form-label">Fournisseur</label>
                            <input type="text" class="form-control" id="supplier" name="supplier" readonly>
                        </div>
                        
                        <div class="mb-3">
                            <label for="paymentDate" class="form-label">Date de paiement</label>
                            <input type="date" class="form-control" id="paymentDate" name="paymentDate" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="paymentAmount" class="form-label">Montant</label>
                            <input type="number" step="0.01" class="form-control" id="paymentAmount" name="paymentAmount" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                        <button type="submit" class="btn btn-primary">Enregistrer le paiement</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Spinner overlay -->
    <div class="spinner-overlay" id="spinnerOverlay">
        <div class="spinner-content">
            <div class="spinner-border text-primary mb-2" role="status">
                <span class="visually-hidden">Chargement...</span>
            </div>
            <div>Traitement du paiement en cours...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    
    <script>
    function showSpinner() {
        document.getElementById('spinnerOverlay').style.display = 'flex';
    }

    function hideSpinner() {
        document.getElementById('spinnerOverlay').style.display = 'none';
    }

    function showAlert(message, type) {
        const alertContainer = document.getElementById('alertContainer');
        const alertHtml = `            <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        `;
        alertContainer.innerHTML = alertHtml;
    }

    function openPaymentModal(button) {
        const modal = new bootstrap.Modal(document.getElementById('paymentModal'));
        
        // Récupérer les données depuis les attributs data-*
        const invoiceId = button.getAttribute('data-invoice-id');
        const supplier = button.getAttribute('data-supplier');
        const amount = button.getAttribute('data-amount');
        
        // Remplir le formulaire
        document.getElementById('invoiceId').value = invoiceId;
        document.getElementById('supplier').value = supplier;
        document.getElementById('paymentAmount').value = amount;
        
        // Définir la date par défaut à aujourd'hui
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('paymentDate').value = today;
        
        modal.show();
    }

    async function submitPayment(event) {
        event.preventDefault();
        
        const form = event.target;
        const formData = new FormData(form);
        const paymentData = Object.fromEntries(formData.entries());
        
        try {
            showSpinner();
            
            const response = await fetch('/accounting/payments', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams(paymentData)
            });
            
            if (!response.ok) {
                throw new Error('Erreur lors du traitement du paiement');
            }
            
            // Fermer le modal
            const modal = bootstrap.Modal.getInstance(document.getElementById('paymentModal'));
            modal.hide();
            
            // Afficher le message de succès
            showAlert('Paiement enregistré avec succès', 'success');
            
            // Recharger la page après un court délai
            setTimeout(() => {
                window.location.reload();
            }, 1500);
            
        } catch (error) {
            console.error('Erreur:', error);
            showAlert('Erreur lors du traitement du paiement. Veuillez réessayer.', 'danger');
        } finally {
            hideSpinner();
        }
    }
    </script>
</body>
</html>
