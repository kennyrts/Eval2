<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Liste des Devis - NewApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">NewApp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/suppliers">Fournisseurs</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-link nav-link">Déconnexion</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Liste des Devis - <span th:text="${supplier}"></span></h2>
            <a th:href="@{/suppliers}" class="btn btn-secondary">Retour</a>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Référence</th>
                                <th>Date</th>
                                <th>Valide jusqu'au</th>
                                <th>Montant Total</th>
                                <th>Statut</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="quotation : ${quotations}">
                                <td th:text="${quotation.name}">REF</td>
                                <td th:text="${quotation.transactionDate}">DATE</td>
                                <td th:text="${quotation.validTill}">VALID_TILL</td>
                                <td th:text="${quotation.grandTotal}">TOTAL</td>
                                <td>
                                    <span th:class="${quotation.status == 'Submitted' ? 'badge bg-success' : 'badge bg-secondary'}"
                                          th:text="${quotation.status}">STATUT</span>
                                </td>
                                <td>
                                    <a th:href="@{/suppliers/quotations/{name}(name=${quotation.name})}" class="btn btn-sm btn-info">Détails</a>
                                </td>
                            </tr>
                            <tr th:if="${quotations.empty}">
                                <td colspan="6" class="text-center">Aucun devis trouvé</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
