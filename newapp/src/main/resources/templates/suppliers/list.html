<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Liste des Fournisseurs - NewApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <style>
        body {
            display: flex;
            min-height: 100vh;
            margin: 0;
        }
        .sidebar {
            width: 250px;
            background-color: #343a40;
            color: #fff;
            flex-shrink: 0;
            height: 100vh;
            position: sticky;
            top: 0;
        }
        .sidebar-header {
            padding: 1.5rem 1rem;
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sidebar-nav {
            padding: 1rem 0;
        }
        .sidebar-nav .nav-link {
            color: rgba(255, 255, 255, 0.7);
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-nav .nav-link.active {
            color: white;
            background-color: rgba(255, 255, 255, 0.1);
        }
        .sidebar-nav .nav-link:hover {
            color: white;
            background-color: rgba(255, 255, 255, 0.05);
        }
        .main-content {
            flex-grow: 1;
            padding: 2rem;
            background-color: #f8f9fa;
        }
        .card {
            border: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .logout-btn {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: auto;
            padding: 1rem;
        }
        .logout-btn button {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            padding: 0.5rem;
            width: 100%;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logout-btn button:hover {
            color: white;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column">
        <div class="sidebar-header">
            <strong>NewApp</strong>
        </div>
        <ul class="nav flex-column sidebar-nav">
            <li class="nav-item">
                <a class="nav-link active" href="/suppliers">
                    <i class="bi bi-building"></i> Fournisseurs
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/accounting/invoices">
                    <i class="bi bi-file-earmark-text"></i> Comptabilité
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/alea/form">
                    <i class="bi bi-file-earmark-plus"></i> Nouveau Devis
                </a>
            </li>
        </ul>
        <div class="logout-btn mt-auto">
            <form th:action="@{/logout}" method="post">
                <button type="submit">
                    <i class="bi bi-box-arrow-right"></i> Déconnexion
                </button>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Liste des Fournisseurs</h2>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Nom</th>
                                <th>Nom du Fournisseur</th>
                                <th>Type</th>
                                <th>Pays</th>
                                <th>Groupe</th>
                                <th>Statut</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="supplier : ${suppliers}">
                                <td th:text="${supplier.name}">NOM</td>
                                <td th:text="${supplier.supplierName}">NOM FOURNISSEUR</td>
                                <td th:text="${supplier.supplierType}">TYPE</td>
                                <td th:text="${supplier.country}">PAYS</td>
                                <td th:text="${supplier.supplierGroup}">GROUPE</td>
                                <td>
                                    <span th:class="${supplier.status == 'Enabled' ? 'badge bg-success' : 'badge bg-danger'}"
                                          th:text="${supplier.status}">STATUT</span>
                                </td>
                                <td>
                                    <a th:href="@{/suppliers/{name}/quotations(name=${supplier.name})}" class="btn btn-sm btn-info">Devis</a>
                                    <a th:href="@{/suppliers/{name}/orders(name=${supplier.name})}" class="btn btn-sm btn-primary">Commandes</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
