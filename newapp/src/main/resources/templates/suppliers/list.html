<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Liste des Fournisseurs - NewApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">NewApp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="/suppliers">Fournisseurs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/accounting/invoices">Comptabilité</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-link nav-link">Déconnexion</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Liste des Fournisseurs</h2>
            <button class="btn btn-primary">Nouveau Fournisseur</button>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Nom</th>
                                <th>Nom du Fournisseur</th>
                                <th>Type</th>
                                <th>Pays</th>
                                <th>Groupe</th>
                                <th>Statut</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="supplier : ${suppliers}">
                                <td th:text="${supplier.name}">NOM</td>
                                <td th:text="${supplier.supplierName}">NOM FOURNISSEUR</td>
                                <td th:text="${supplier.supplierType}">TYPE</td>
                                <td th:text="${supplier.country}">PAYS</td>
                                <td th:text="${supplier.supplierGroup}">GROUPE</td>
                                <td>
                                    <span th:class="${supplier.status == 'Enabled' ? 'badge bg-success' : 'badge bg-danger'}"
                                          th:text="${supplier.status}">STATUT</span>
                                </td>
                                <td>
                                    <a th:href="@{/suppliers/{name}/quotations(name=${supplier.name})}" class="btn btn-sm btn-info">Devis</a>
                                    <a th:href="@{/suppliers/{name}/orders(name=${supplier.name})}" class="btn btn-sm btn-primary">Commandes</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
