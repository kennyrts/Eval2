<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Liste des Commandes - NewApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">NewApp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/suppliers">Fournisseurs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/accounting/invoices">Comptabilité</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-link nav-link">Déconnexion</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Liste des Commandes - <span th:text="${supplier}"></span></h2>
            <a th:href="@{/suppliers}" class="btn btn-secondary">Retour</a>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Référence</th>
                                <th>Date</th>
                                <th>Date Requise</th>
                                <th>Montant Total</th>
                                <th>Statut</th>
                                <th>Société</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="order : ${orders}">
                                <td th:text="${order.name}">REF</td>
                                <td th:text="${order.transactionDate}">DATE</td>
                                <td th:text="${order.requiredBy}">DATE REQUISE</td>
                                <td th:text="${order.grandTotal}">TOTAL</td>
                                <td>
                                    <span th:class="${'badge ' + 
                                        (order.status == 'To Receive and Bill' ? 'bg-warning' : 
                                        (order.status == 'Completed' ? 'bg-success' : 
                                        (order.status == 'To Bill' ? 'bg-info' : 'bg-secondary')))}"
                                          th:text="${order.status}">STATUT</span>
                                </td>
                                <td th:text="${order.company}">SOCIÉTÉ</td>
                                <td>
                                    <a th:href="@{/suppliers/orders/{orderName}/pdf(orderName=${order.name})}" 
                                       class="btn btn-sm btn-primary" 
                                       target="_blank" 
                                       title="Imprimer">
                                        <i class="bi bi-printer"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${orders.empty}">
                                <td colspan="7" class="text-center">Aucune commande trouvée</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
